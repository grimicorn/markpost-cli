name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITLEAKS_VERSION: 8.30.1

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "${base_url}/${asset}" -o "${asset}"
          curl -sSfL "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep -F "  ${asset}" checksums.txt | sha256sum -c -
          tar -xzf "${asset}" gitleaks
          ./gitleaks version
      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        run: ./gitleaks git --no-banner --redact --config .gitleaks.toml --log-opts "${BASE_SHA}..${HEAD_SHA}" .
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      - name: Scan full history
        if: github.event_name == 'push'
        run: ./gitleaks git --no-banner --redact --config .gitleaks.toml .

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Print full advisory summary (non-blocking)
        run: npm audit || true
      - name: Fail on high or critical advisories
        run: npm audit --audit-level=high
